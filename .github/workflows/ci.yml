name: CI
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: cronos
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Check Java version
        run: java -version
      - name: Maven version
        run: mvn --version
      - name: Maven validate
        run: mvn validate -pl hadoop-common -am -DskipTests -q
