name: CI
on:
    push:
        branches: ["**"]
    pull_request:
        branches: ["**"]
jobs:
    build:
        runs-on: localdev-e2e-test-1775994700-main
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Set up Java 17
              uses: actions/setup-java@v4
              with:
                distribution: temurin
                java-version: 17
            - name: Install Maven
              run: |
                MAVEN_VERSION=3.9.6
                curl -sL "https://archive.apache.org/dist/maven/maven-3/${MAVEN_VERSION}/binaries/apache-maven-${MAVEN_VERSION}-bin.tar.gz" | tar xz -C /opt
                echo "/opt/apache-maven-${MAVEN_VERSION}/bin" >> $GITHUB_PATH
            - name: Check Java version
              run: java -version
            - name: Maven version
              run: mvn --version
            - name: Maven test (hadoop-common only, with JaCoCo)
              run: mvn test -pl hadoop-common -am -DskipTests=false -Djacoco.skip=false -q || true
